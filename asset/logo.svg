<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a0a3d"/>
      <stop offset="35%" stop-color="#7c1f6b"/>
      <stop offset="60%" stop-color="#ff4500"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7d6"/>
      <stop offset="100%" stop-color="#ff8a1e"/>
    </linearGradient>
    <linearGradient id="plane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eafcff"/>
      <stop offset="100%" stop-color="#5ad1ff"/>
    </linearGradient>
    <linearGradient id="planeShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c8ff"/>
      <stop offset="100%" stop-color="#0077aa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffe0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00ffe0" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="round">
      <rect x="8" y="8" width="496" height="496" rx="96"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect x="8" y="8" width="496" height="496" fill="url(#sky)"/>

    <circle cx="256" cy="330" r="120" fill="url(#sun)" opacity="0.95"/>

    <g stroke="#ff2fb0" stroke-width="2" opacity="0.55">
      <line x1="8" y1="380" x2="504" y2="380"/>
      <line x1="8" y1="410" x2="504" y2="410"/>
      <line x1="8" y1="445" x2="504" y2="445"/>
      <line x1="8" y1="485" x2="504" y2="485"/>
    </g>
    <g stroke="#ff2fb0" stroke-width="2" opacity="0.4">
      <line x1="60" y1="360" x2="-40" y2="504"/>
      <line x1="160" y1="360" x2="90" y2="504"/>
      <line x1="256" y1="360" x2="256" y2="504"/>
      <line x1="352" y1="360" x2="422" y2="504"/>
      <line x1="452" y1="360" x2="552" y2="504"/>
    </g>

    <g transform="translate(105,335) rotate(-13)">
      <polygon points="-14,-150 14,-150 22,-140 -6,150 -22,142" fill="#ff9d4d"/>
      <polygon points="14,-150 22,-140 -6,150 6,142" fill="#c94f13"/>
    </g>

    <g transform="translate(405,300) rotate(11)">
      <polygon points="-11,-88 11,-88 17,-80 -5,92 -17,86" fill="#9aa3ab"/>
      <polygon points="11,-88 17,-80 -5,92 5,86" fill="#5c666f"/>
    </g>

    <g transform="translate(378,420)">
      <polygon points="0,-24 19,0 0,9 -19,0" fill="#ffce54"/>
      <polygon points="0,-24 19,0 0,9" fill="#e2a020"/>
    </g>

    <g transform="translate(150,430)">
      <circle cx="0" cy="0" r="9" fill="#ffd400"/>
    </g>

    <g transform="translate(256,256) rotate(-38)">
      <circle cx="0" cy="0" r="46" fill="url(#glow)"/>
      <polygon points="0,-46 34,30 0,16 -34,30" fill="url(#plane)"/>
      <polygon points="0,-46 34,30 0,16" fill="url(#planeShade)"/>
      <polygon points="0,16 -10,34 0,26 10,34" fill="#0d6f96"/>
    </g>

    <text x="256" y="150" text-anchor="middle" font-family="Trebuchet MS, Verdana, sans-serif" font-weight="700" font-size="58" letter-spacing="6" fill="#ffffff" opacity="0.95">LLOF</text>
    <text x="256" y="178" text-anchor="middle" font-family="Trebuchet MS, Verdana, sans-serif" font-weight="400" font-size="15" letter-spacing="5" fill="#00ffe0">TERMINAL LOOP</text>
  </g>

  <rect x="8" y="8" width="496" height="496" rx="96" fill="none" stroke="#00ffe0" stroke-width="4" opacity="0.5"/>
</svg>
